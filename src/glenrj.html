<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS Stylesheet-->
    <link rel="stylesheet" href="styles/style.css">
    <!-- Favicon -->
    <link type="image/png" href="./assets/favicon.png" rel="icon">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css"
        integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    <!-- jQuery CDN -->
    <script src='https://code.jquery.com/jquery-3.2.1.min.js'
        integrity='sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4=' crossorigin='anonymous'></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat|Open+Sans|Oswald:300,400" rel="stylesheet">
    <title>glenrj</title>
</head>
<body id="glenrj">
    <!-- HEADER -->
    <header class="wrapper">
        <nav>
            <!-- hamburger menu -->
            <ul class="nav hide">
                <li><a href="#pokemon-game">Pok&#233;mon</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="index.html">Work</a></li>
            </ul>
            <!-- menu icon -->
            <button class="navButton"><i class="fas fa-bars hamburger"></i></button>
        </nav>
        <!-- main header content -->
        <div class="content">
            <!-- image -->
            <div class="headshot">
                <img src="assets/glenrj/glenrj-pokemon-sword.jpeg" alt="A cartoon picture of glenrj, taken from the game Pokémon Sword">
            </div>
            <!-- description -->
            <div class="text">
                <h1>Hi! I'm glenrj</h1>
                <div class="headerLine"></div>
                <p class="about">
                    This is a page for side projects and experiments. Click around, play a game, and enjoy your stay!
                </p>
            </div>
        </div>
        <!-- styled line element bridging two sections -->
        <div class="sectionLine"></div>
    </header>
    <main class="wrapper">
        <!-- POKÉMON GAME SECTION -->
        <section class="pokemon-game" id="pokemon-game">
            <div class="content">
                <!-- left column - pokemon image -->
                <div class="column">
                    <div class="image hidden">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/197.png" alt="">
                    </div>
                    <h3 class="name">Umbreon</h3>
                </div>
                <!-- right column - description and game -->
                <div class="column">
                    <h2>Who's That Pokémon?</h2>
                    <h3>Can you guess the pokémon based on it's silhouette?</h3>
                    <form action="">
                        <label for="pokemon" class="visuallyhidden">Name:</label>
                        <input type="text" name="pokemon" placeholder="Pokémon" id="pokemon" required>
                    </form>
                </div>
            </div>
            <!-- styled line bridging sections -->
            <div class="portfolioLine"></div>
        </section>
        <!-- CONTACT SECTION -->
        <section class="contact" id="contact">
            <div class="content">
                <h2>Thanks for Stopping By</h2>
                <!-- links/info -->
                <div class="contactLinks">
                    <ul>
                        <li><a href="https://twitter.com/glenmccann" target="_blank"><i class="fab fa-twitter"></i></a></li>
                        <li><a href="https://github.com/glenrj" target="_blank"><i class="fab fa-github"></i></a></li>
                        <li><a href="https://www.linkedin.com/in/glen-mccann-56545b17a/" target="_blank"><i
                                    class="fab fa-linkedin-in"></i></a></li>
                        <li><a href="https://www.instagram.com/glenrj_photomode/" target="_blank"><i
                                    class="fab fa-instagram"></i></a></li>
                    </ul>
                </div>
            </div>
        </section>
    </main>
    <footer class="wrapper">
        <!-- no content in footer, just a decorative background image in css -->
    </footer>


    <!-- JavaScript -->
    <script src="./scripts/script.js"></script>
</body>
</html>
